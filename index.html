<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>My Favorites</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-img-top {
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1>My Favorites</h1>
            <p class="text-muted fs-5">Taro Yamada のお気に入り紹介</p>
        </div>

        <div class="row row-cols-1 row-cols-md-3 g-4">

            <div class="col">
                <div class="card h-100 shadow-sm">
                    <img src="img/img1.jpg" class="card-img-top" alt="お気に入り1の画像">
                    <div class="card-body">
                        <h5 class="card-title">〇〇（好きなゲーム/アニメなど）</h5>

                        <p class="card-text">
                            ここにお気に入りの理由や、おすすめのポイントを書きます。<br>
                            （例：世界観が好きで、毎日遊んでいます！）
                        </p>
                    </div>
                    <div class="card-footer bg-white border-top-0">
                        <span class="badge bg-primary">カテゴリ1</span>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-sm">
                    <img src="img/img2.jpg" class="card-img-top" alt="お気に入り2の画像">
                    <div class="card-body">
                        <h5 class="card-title">〇〇（好きな食べ物/場所など）</h5>

                        <p class="card-text">
                            ここにお気に入りの理由や、おすすめのポイントを書きます。<br>
                            （例：ここのラーメンが一番美味しいです。）
                        </p>
                    </div>
                    <div class="card-footer bg-white border-top-0">
                        <span class="badge bg-success">カテゴリ2</span>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-sm">
                    <img src="img/img3.jpg" class="card-img-top" alt="お気に入り3の画像">
                    <div class="card-body">
                        <h5 class="card-title">〇〇（おすすめの映画/本など）</h5>

                        <p class="card-text">
                            ここにお気に入りの理由や、おすすめのポイントを書きます。<br>
                            （例：ラストシーンが感動的でおすすめです！）
                        </p>
                    </div>
                    <div class="card-footer bg-white border-top-0">
                        <span class="badge bg-danger">カテゴリ3</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
